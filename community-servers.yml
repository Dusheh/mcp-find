# Community-submitted MCP servers
# Add your server by opening a PR. See CONTRIBUTING.md for guidelines.
#
# Required fields: name, github_url, package_name, description
# Optional fields: package_type (npm|pypi|docker), category
servers:
  - name: "BuyWhere MCP Server"
    github_url: "https://github.com/BuyWhere/buywhere-mcp"
    package_name: "@buywhere/mcp-server"
    description: "Search and compare products from Singapore, SEA, and US markets via Model Context Protocol. Cross-border e-commerce product catalog for AI agents."
    package_type: "npm"
    category: "other"
  - name: "Xquik"
    github_url: "https://github.com/Xquik-dev/x-twitter-scraper"
    package_name: "x-developer"
    description: "X and Twitter automation MCP server for tweet search, profile tweets, follower export, media workflows, webhooks, and confirmation-gated posting."
    package_type: "npm"
    category: "communication"
  - name: "myclaw-toolkit"
    github_url: "https://github.com/Dusheh/myclaw-toolkit"
    package_name: "myclaw-toolkit"
    description: "23-in-1 developer utility MCP server — web search, exchange rates, crypto prices, QR codes, UUID generation, RSS feeds, and more."
    package_type: "npm"
    category: "devtools"
